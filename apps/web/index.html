<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ✅ CLEAN VIEWPORT (NO SCALING HACKS) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Unio | Professional Network</title>

    <!-- 🚀 THEME SYNC (KEEP THIS — THIS IS GOOD PRACTICE) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme-mode") || "system";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

          var activeTheme =
            stored === "dark" || (stored === "system" && prefersDark)
              ? "dark"
              : "light";

          document.documentElement.classList.toggle("dark", activeTheme === "dark");
          document.documentElement.setAttribute("data-theme", activeTheme);
        } catch (e) {
          console.error("Unio Theme Init Error:", e);
        }
      })();
    </script>
  </head>

  <body
    class="antialiased selection:bg-accent/20 selection:text-accent overflow-x-hidden"
  >
    <!-- 🔌 PORTAL ROOT -->
    <div id="unio-portal-root"></div>

    <!-- 🧠 APP ROOT -->
    <div id="root"></div>

    <!-- 🚀 APP ENTRY -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
